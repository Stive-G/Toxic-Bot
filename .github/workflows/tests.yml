name: Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Check JavaScript syntax
        run: find src scripts -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Validate Docker Compose
        run: docker compose --env-file .env.example config --quiet
